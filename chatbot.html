<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ChatBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #4A90E2; --bg-color: #f5f7fb; --text-color: #172033; }
        body { margin: 0; min-height: 100vh; font-family: Pretendard, Arial, sans-serif; background: var(--bg-color); color: var(--text-color); }
        #app-nav { position: fixed; top: 0; left: 0; z-index: 120; width: 292px; height: 100vh; background: rgba(255,255,255,0.97); box-shadow: 5px 0 18px rgba(15,23,42,0.10); padding: 30px 14px 18px; box-sizing: border-box; display: flex; flex-direction: column; }
        .nav-brand { margin: 0 0 30px 8px; color: #2563eb; font-size: 24px; font-weight: 800; letter-spacing: 0; }
        .nav-menu { display: grid; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; width: 100%; min-height: 50px; border: none; background: transparent; color: #64748b; padding: 0 14px; border-radius: 8px; font-size: 16px; font-weight: 800; cursor: pointer; text-align: left; text-decoration: none; box-sizing: border-box; }
        .nav-item:hover, .nav-item.active { background: #eaf2ff; color: #2563eb; }
        .nav-icon { width: 24px; text-align: center; font-size: 19px; line-height: 1; }
        .nav-auth { margin-top: auto; display: grid; gap: 8px; padding: 12px 8px 0; border-top: 1px solid #e5e7eb; }
        .nav-auth button { border: none; background: #eef4fb; color: #24425f; padding: 11px 12px; border-radius: 8px; font-weight: 800; cursor: pointer; text-align: left; }
        .nav-auth button:hover { background: var(--primary-color); color: white; }
        .account-toggle { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; border: none; background: transparent; color: #111827; padding: 8px 4px; font-weight: 800; cursor: pointer; }
        .account-avatar { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: #eef2ff; color: #4f46e5; font-weight: 800; }
        .account-name { flex: 1; text-align: left; }
        .account-caret { color: #4f46e5; font-size: 30px; line-height: 1; transition: transform 0.18s ease; }
        .account-caret.open { transform: rotate(-90deg); }
        .logout-menu { display: none; margin-bottom: 8px; padding: 10px 12px; border-radius: 8px; background: white; box-shadow: 0 8px 20px rgba(15,23,42,0.12); color: #ef4444; font-weight: 800; cursor: pointer; }
        .logout-menu.open { display: block; }
        .page { margin-left: 292px; min-height: 100vh; padding: 34px 40px 60px; box-sizing: border-box; }
        .page-inner { width: min(920px, 100%); margin: 0 auto; }
        h1 { margin: 0 0 20px; font-size: 34px; color: #172033; }
        .panel { background: white; border-radius: 14px; padding: 22px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); border: 1px solid #e5e7eb; }
        .form { display: flex; gap: 10px; }
        input { flex: 1; min-width: 0; border: 1px solid #d6dde6; border-radius: 10px; padding: 14px; font-size: 16px; }
        .form button { border: none; border-radius: 10px; background: var(--primary-color); color: white; padding: 0 20px; font-size: 16px; font-weight: 800; cursor: pointer; }
        .answer { margin-top: 18px; white-space: pre-wrap; line-height: 1.7; font-size: 15px; }
        .sources { margin-top: 16px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
        .sources a { display: block; margin-top: 7px; color: #2563eb; font-weight: 800; text-decoration: none; word-break: keep-all; }
</style>
</head>
<body>
    <aside id="app-nav">
        <h2 class="nav-brand">DKU Campus</h2>
        <div class="nav-menu">
            <a class="nav-item " href="/"><span class="nav-icon">▦</span>Campus</a>
            <a class="nav-item active" href="/chatbot"><span class="nav-icon">⊕</span>ChatBot</a>
            <a class="nav-item " href="/event"><span class="nav-icon">□</span>Event</a>
        </div>
        <div id="auth-buttons" class="nav-auth">
            <button onclick="location.href='/login'">로그인</button>
        </div>
    </aside>
    <main class="page">
        <div class="page-inner">
            <h1>ChatBot</h1>
            <section class="panel">
                <div class="form">
                    <input id="question" placeholder="예: 학생증 신청 방법 알려줘" onkeydown="if(event.key==='Enter') ask()">
                    <button onclick="ask()">질문</button>
                </div>
                <div class="answer" id="answer">학사일정과 공지사항을 질문해보세요.</div>
            </section>
        </div>
    </main>
    <script>
        function escapeHtml(value) { return String(value || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
        function removeSourceText(value) { const text = String(value || ''); const index = text.indexOf('참고 출처:'); return index === -1 ? text.trim() : text.slice(0, index).trim(); }
        function render(data) {
            const answer = document.getElementById('answer');
            if (data.detail || data.error) { answer.textContent = data.detail || data.error; return; }
            const body = escapeHtml(removeSourceText(data.answer || '응답이 없습니다.'));
            const sources = Array.isArray(data.sources) ? data.sources : [];
            const links = sources.filter(s => s && s.source_url).map((s, i) => '<a href="' + escapeHtml(s.source_url) + '" target="_blank" rel="noopener noreferrer">[' + (i + 1) + '] ' + escapeHtml(s.title || '출처') + '</a>').join('');
            answer.innerHTML = body + (links ? '<div class="sources"><strong>참고 출처</strong>' + links + '</div>' : '');
        }
        async function ask() {
            const input = document.getElementById('question');
            const question = input.value.trim();
            if (!question) { alert('질문을 입력해주세요.'); return; }
            document.getElementById('answer').textContent = '답변 생성 중...';
            try {
                const response = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question }) });
                render(await response.json());
            } catch (error) { document.getElementById('answer').textContent = '챗봇 요청에 실패했습니다.'; }
        }
        function updateAuthButtons() {
            const token = localStorage.getItem('access_token');
            const name = localStorage.getItem('name');
            const authButtons = document.getElementById('auth-buttons');
            if (!authButtons) return;
            if (token && name) {
                authButtons.innerHTML = [
                    '<div class="logout-menu" id="logout-menu" onclick="logout()">↪ 로그아웃</div>',
                    '<button class="account-toggle" onclick="toggleAccountMenu()">',
                    '<span class="account-avatar">' + escapeHtml(name.slice(0, 1)) + '</span>',
                    '<span class="account-name">' + escapeHtml(name) + '</span>',
                    '<span class="account-caret" id="account-caret">›</span>',
                    '</button>'
                ].join('');
            } else {
                authButtons.innerHTML = '<button onclick="location.href=\'/login\'">로그인</button>';
            }
        }
        function toggleAccountMenu() {
            const menu = document.getElementById('logout-menu');
            const caret = document.getElementById('account-caret');
            if (menu) menu.classList.toggle('open');
            if (caret) caret.classList.toggle('open');
        }
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('name');
            updateAuthButtons();
        }
        window.addEventListener('DOMContentLoaded', function () { updateAuthButtons();  });
    </script>
</body>
</html>
