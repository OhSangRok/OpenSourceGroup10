<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Event</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #4A90E2; --bg-color: #f5f7fb; --text-color: #172033; }
        body { margin: 0; min-height: 100vh; font-family: 'Pretendard', sans-serif; background: var(--bg-color); color: var(--text-color); }

        #app-nav { position: fixed; top: 0; left: 0; z-index: 120; width: 292px; height: 100vh; background: rgba(255, 255, 255, 0.97); box-shadow: 5px 0 18px rgba(15, 23, 42, 0.10); padding: 30px 14px 18px; box-sizing: border-box; display: flex; flex-direction: column; }
        .nav-brand { margin: 0 0 30px 8px; color: #2563eb; font-size: 24px; font-weight: 800; letter-spacing: 0; line-height: 1.2; font-family: 'Pretendard', sans-serif; }
        .nav-menu { display: grid; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; width: 100%; min-height: 50px; border: none; background: transparent; color: #64748b; padding: 0 14px; border-radius: 8px; font-size: 16px; font-weight: 800; cursor: pointer; text-align: left; text-decoration: none; box-sizing: border-box; font-family: inherit; }
        .nav-item:hover, .nav-item.active { background: #eaf2ff; color: #2563eb; }
        .nav-icon { width: 24px; text-align: center; font-size: 19px; line-height: 1; }
        .nav-auth { margin-top: auto; display: grid; gap: 8px; padding: 12px 8px 0; border-top: 1px solid #e5e7eb; }
        .nav-auth button { border: none; background: #eef4fb; color: #24425f; padding: 11px 12px; border-radius: 8px; font-weight: 800; cursor: pointer; text-align: left; font-family: inherit; }
        .nav-auth button:hover { background: var(--primary-color); color: white; }
        .account-toggle { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; border: none; background: transparent; color: #111827; padding: 8px 12px; font-weight: 800; cursor: pointer; font-family: inherit; box-shadow: none; outline: none; }
        .nav-auth .account-toggle, .nav-auth .account-toggle:hover { background: transparent; color: #111827; box-shadow: none; outline: none; }
        .account-avatar { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: #eef2ff; color: #4f46e5; font-weight: 800; padding: 0; }
        .account-name { flex: 1; text-align: left; color: #111827; padding: 0; }
        .account-caret { display: inline-flex; align-items: center; justify-content: flex-end; min-width: 46px; color: #4f46e5; font-size: 24px; line-height: 1; padding: 0; }
        .logout-menu { display: none; margin-bottom: 8px; padding: 10px 12px; border-radius: 8px; background: white; box-shadow: 0 8px 20px rgba(15,23,42,0.12); color: #ef4444; font-weight: 800; cursor: pointer; }
        .logout-menu.open { display: block; }
        .nav-interests { display: none; margin-top: 18px; padding: 14px 8px 0; border-top: 1px solid #e5e7eb; }
        .nav-interests.is-visible { display: block; }
        .nav-interests h3 { margin: 0 0 10px; color: #172033; font-size: 14px; font-weight: 800; }
        .nav-interest-list { display: grid; gap: 8px; }
        .nav-interest-card { width: 100%; min-width: 0; border: 1px solid #e5e7eb; border-radius: 8px; background: #ffffff; padding: 10px 12px; color: #172033; font-family: inherit; text-align: left; cursor: pointer; }
        .nav-interest-card:hover { border-color: #bfdbfe; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.10); }
        .nav-interest-title { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #172033; font-size: 13px; font-weight: 800; }
        .nav-interest-time { display: block; margin-top: 6px; color: #2563eb; font-size: 12px; font-weight: 800; }
        .nav-interest-empty { margin: 0; color: #94a3b8; font-size: 13px; font-weight: 700; line-height: 1.5; }

        .page { margin-left: 292px; min-height: 100vh; padding: 34px 40px 60px; box-sizing: border-box; }
        .page-inner { width: min(920px, 100%); margin: 0 auto; }
        h1 { margin: 0 0 20px; font-size: 34px; color: #172033; }
        .panel { background: white; border-radius: 14px; padding: 22px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); border: 1px solid #e5e7eb; }
        .form { display: flex; gap: 10px; }
        input { flex: 1; min-width: 0; border: 1px solid #d6dde6; border-radius: 10px; padding: 14px; font-size: 16px; }
        .form button { border: none; border-radius: 10px; background: var(--primary-color); color: white; padding: 0 20px; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; }
        .answer { margin-top: 18px; white-space: pre-wrap; line-height: 1.7; font-size: 15px; }
        .sources { margin-top: 16px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
        .sources a { display: block; margin-top: 7px; color: #2563eb; font-weight: 800; text-decoration: none; word-break: keep-all; }
        .event-list { display: grid; gap: 14px; margin-top: 16px; }
        .event-section { overflow: hidden; background: white; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 6px 16px rgba(15,23,42,0.06); }
        .event-section > summary { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 54px; padding: 0 16px; color: #172033; font-size: 17px; font-weight: 800; cursor: pointer; list-style: none; }
        .event-section > summary::-webkit-details-marker { display: none; }
        .event-section > summary::after { content: ''; width: 8px; height: 8px; border-right: 2px solid #2563eb; border-bottom: 2px solid #2563eb; transform: rotate(45deg); transition: transform .18s ease; }
        .event-section[open] > summary::after { transform: rotate(225deg); }
        .section-count { color: #64748b; font-size: 13px; font-weight: 800; }
        .section-body { display: grid; gap: 0; border-top: 1px solid #e5e7eb; }
        .event-card { border-top: 1px solid #eef2f7; }
        .event-card:first-child { border-top: none; }
        .event-card > summary { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; min-height: auto; padding: 14px 16px; font-size: 15px; cursor: pointer; list-style: none; }
        .event-card > summary::-webkit-details-marker { display: none; }
        .event-card > summary::after { content: ''; width: 7px; height: 7px; margin-top: 6px; border-right: 2px solid #94a3b8; border-bottom: 2px solid #94a3b8; transform: rotate(45deg); transition: transform .18s ease; }
        .event-card[open] > summary::after { transform: rotate(225deg); }
        .event-title { display: flex; align-items: flex-start; gap: 9px; min-width: 0; }
        .event-title-copy { display: grid; gap: 7px; min-width: 0; }
        .event-title strong { color: #172033; font-size: 16px; line-height: 1.35; word-break: keep-all; }
        .event-time { color: #2563eb; font-weight: 800; font-size: 13px; }
        .interest-button { flex: 0 0 auto; border: none; background: transparent; color: #c8c8c8; padding: 0; font-family: inherit; font-size: 22px; line-height: 1; font-weight: 800; cursor: pointer; }
        .interest-button.active { color: #f4c542; }
        .interest-button:hover { color: #f4c542; }
        .event-detail { padding: 0 16px 16px; color: #64748b; line-height: 1.55; font-size: 14px; }
        .event-source { display: inline-flex; align-items: center; margin-top: 10px; min-height: 24px; color: #2563eb; font-size: 13px; font-weight: 800; text-decoration: none; }
        .event-source:hover { color: #2563eb; }

<body>

    <aside id="app-nav">
        <h2 class="nav-brand">DKU Campus</h2>
        <div class="nav-menu">
            <a class="nav-item " href="/"><span class="nav-icon">▦</span>Campus</a>
            <a class="nav-item " href="/chatbot"><span class="nav-icon">⊕</span>ChatBot</a>
            <a class="nav-item active" href="/event"><span class="nav-icon">□</span>Event</a>
            <a class="nav-item " href="/mypage"><span class="nav-icon">▣</span>My Page</a>
        </div>
        <div id="nav-interests" class="nav-interests">
            <h3>즐겨찾기 일정</h3>
            <div id="nav-interest-list" class="nav-interest-list">
                <p class="nav-interest-empty">관심 일정이 없습니다.</p>
            </div>
        </div>
        <div id="auth-buttons" class="nav-auth">
            <button onclick="location.href='/login'">로그인</button>
        </div>
    </aside>
    <main class="page">
        <div class="page-inner">
            <h1>Event</h1>
            <section class="panel">
                <div class="answer" id="answer">오늘 진행 중인 일정을 불러오는 중...</div>
                <div class="event-list" id="event-list"></div>
            </section>
        </div>
    </main>
    <script>
        function escapeHtml(value) { return String(value || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
        function formatDate(value) {
            if (!value) return '';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value).slice(0, 10);
            return (date.getMonth() + 1) + '월 ' + date.getDate() + '일';
        }
        function formatTodayTitle() {
            const today = new Date();
            return (today.getMonth() + 1) + '월 ' + today.getDate() + '일 일정입니다.';
        }
        function formatEventPeriod(item) {
            const start = formatDate(item.start_datetime);
            const end = formatDate(item.end_datetime);
            if (!start && !end) return '';
            if (start === end || !end) return start;
            return start + ' ~ ' + end;
        }
        const EVENT_INTEREST_KEY = 'dku_event_interests';
        let todayEvents = [];
        let interestedEventKeys = new Set();

        function getEventKey(item) {
            return String(item.event_id || [item.title, item.start_datetime, item.source_url || ''].join('|'));
        }

        function getInterestedEvents() {
            try {
                const data = JSON.parse(localStorage.getItem(EVENT_INTEREST_KEY) || '[]');
                return Array.isArray(data) ? data : [];
            } catch (error) {
                return [];
            }
        }

        function saveInterestedEvents(items) {
            localStorage.setItem(EVENT_INTEREST_KEY, JSON.stringify(items));
            interestedEventKeys = new Set(items.map(getEventKey));
        }

        function renderInterestSidebar() {
            const box = document.getElementById('nav-interests');
            const list = document.getElementById('nav-interest-list');
            if (!box || !list) return;

            const items = getInterestedEvents().slice(0, 8);
            interestedEventKeys = new Set(items.map(getEventKey));
            box.classList.toggle('is-visible', items.length > 0);

            if (items.length === 0) {
                list.innerHTML = '<p class="nav-interest-empty">관심 일정이 없습니다.</p>';
                return;
            }

            list.innerHTML = items.map(function (item) {
                return [
                    '<button class="nav-interest-card" title="' + escapeHtml(item.title) + '">',
                    '<span class="nav-interest-title">' + escapeHtml(item.title) + '</span>',
                    '<span class="nav-interest-time">' + escapeHtml(formatEventPeriod(item)) + '</span>',
                    '</button>'
                ].join('');
            }).join('');
        }

        function toggleInterest(index, button) {
            const item = todayEvents[index];
            if (!item) return;

            const key = getEventKey(item);
            const isInterested = interestedEventKeys.has(key);
            const nextItems = getInterestedEvents().filter(function (eventItem) {
                return getEventKey(eventItem) !== key;
            });

            if (!isInterested) {
                nextItems.unshift(item);
            }

            saveInterestedEvents(nextItems.slice(0, 20));
            if (button) {
                button.classList.toggle('active', !isInterested);
            }
            renderInterestSidebar();
        }

        function groupEvents(events) {
            const order = ['학사일정', '채용공지', '공지', '입찰공고', '행사'];
            const groups = {};
            events.forEach(function (item, index) {
                const type = item.source_type || item.department || '행사';
                if (!groups[type]) groups[type] = [];
                groups[type].push({ item: item, index: index });
            });
            return Object.keys(groups).sort(function (a, b) {
                const ai = order.indexOf(a);
                const bi = order.indexOf(b);
                if (ai === -1 && bi === -1) return a.localeCompare(b, 'ko');
                if (ai === -1) return 1;
                if (bi === -1) return -1;
                return ai - bi;
            }).map(function (type) {
                return { type: type, items: groups[type] };
            });
        }
        function renderEventItem(entry) {
            const item = entry.item;
            const index = entry.index;
            const isInterested = interestedEventKeys.has(getEventKey(item));
            const source = item.source_url
                ? '<a class="event-source" href="' + escapeHtml(item.source_url) + '" target="_blank" rel="noopener">원문 보기</a>'
                : '';
            return [
                '<details class="event-card">',
                '<summary>',
                '<span class="event-title">',
                '<button class="interest-button' + (isInterested ? ' active' : '') + '" title="즐겨찾기" onclick="event.preventDefault(); event.stopPropagation(); toggleInterest(' + index + ', this)">★</button>',
                '<span class="event-title-copy">',
                '<strong>' + escapeHtml(item.title) + '</strong>',
                '<span class="event-time">' + escapeHtml(formatEventPeriod(item)) + '</span>',
                '</span>',
                '</span>',
                '</summary>',
                '<div class="event-detail">',
                '<div>' + escapeHtml(item.description || '').replaceAll('\n', '<br>') + '</div>',
                source,
                '</div>',
                '</details>'
            ].join('');
        }
        function renderEventSection(group, index) {
            return [
                '<details class="event-section"' + (index === 0 ? ' open' : '') + '>',
                '<summary><span>' + escapeHtml(group.type) + '</span><span class="section-count">' + group.items.length + '건</span></summary>',
                '<div class="section-body">',
                group.items.map(renderEventItem).join(''),
                '</div>',
                '</details>'
            ].join('');
        }
        async function loadTodayEvents() {
            const answer = document.getElementById('answer');
            const list = document.getElementById('event-list');
            try {
                const response = await fetch('/events/today');
                const events = await response.json();
                if (!Array.isArray(events) || events.length === 0) {
                    answer.textContent = '오늘 날짜가 포함된 일정이 없습니다.';
                    list.innerHTML = '';
                    return;
                }
                todayEvents = events;
                interestedEventKeys = new Set(getInterestedEvents().map(getEventKey));
                answer.textContent = formatTodayTitle();
                list.innerHTML = groupEvents(events).map(renderEventSection).join('');
                renderInterestSidebar();
            } catch (error) {
                answer.textContent = '오늘 일정을 불러오지 못했습니다.';
            }
        }

        function updateAuthButtons() {
            const token = localStorage.getItem('access_token');
            const name = localStorage.getItem('name');
            const authButtons = document.getElementById('auth-buttons');
            if (!authButtons) return;
            if (token && name) {
                authButtons.innerHTML = [
                    '<div class="logout-menu" id="logout-menu" onclick="logout()">↪ 로그아웃</div>',
                    '<button class="account-toggle" onclick="toggleAccountMenu()">',
                    '<span class="account-avatar">' + escapeHtml(name.slice(0, 1)) + '</span>',
                    '<span class="account-name">' + escapeHtml(name) + '</span>',
                    '<span class="account-caret" id="account-caret"></span>',
                    '</button>'
                ].join('');
            } else {
                authButtons.innerHTML = '<button onclick="location.href=\'/login\'">로그인</button>';
            }
        }
        function toggleAccountMenu() {
            const menu = document.getElementById('logout-menu');
            const caret = document.getElementById('account-caret');
            if (!menu || !caret) return;
            const isOpen = menu.classList.toggle('open');
            caret.classList.toggle('is-open', isOpen);
        }
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('name');
            updateAuthButtons();
        }

        window.addEventListener('DOMContentLoaded', function () { updateAuthButtons(); renderInterestSidebar(); loadTodayEvents(); });
    </script>
</body>
</html>
