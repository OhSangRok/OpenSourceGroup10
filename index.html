<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Campus Bus Map</title>
    <!-- 구글 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4A90E2;
            /* 학교 상징색 */
            --bg-color: #f8f9fa;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        .wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 360px;
            height: 100vh;
            background: white;
            z-index: 150;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 18px rgba(15, 23, 42, 0.12);
        }

        #sidebar.hidden {
            display: none;
        }

        #map-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .header {
            position: relative;
            padding: 30px 22px 22px;
            background: white;
            color: #172033;
            border-bottom: 1px solid #e5e7eb;
        }

        .sidebar-close-btn {
            position: absolute;
            top: 14px;
            right: 16px;
            border: none;
            background: #eef4fb;
            color: #2563eb;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: 800;
            line-height: 1;
            cursor: pointer;
        }

        .header h1 {
            margin: 0;
            padding-right: 40px;
            font-size: 24px;
            font-weight: 800;
            color: #2563eb;
        }

        .header p {
            margin: 7px 0 0;
            font-size: 14px;
            color: #64748b;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f8fafc;
        }

        .bus-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
            border: 1px solid #e5e7eb;
            cursor: pointer;
        }

        .bus-card:hover {
            transform: translateY(-1px);
            border-color: #bfdbfe;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.10);
        }

        .bus-name {
            font-weight: 800;
            font-size: 17px;
            color: #172033;
            display: flex;
            align-items: center;
            justify-content: space-between;
            line-height: 1.35;
        }

        .bus-status {
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
            line-height: 1.5;
        }

        .arrival-time {
            margin-top: 10px;
            color: #2563eb;
            font-weight: 800;
            font-size: 14px;
        }

        #app-nav {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 80;
            width: 292px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 5px 0 18px rgba(15, 23, 42, 0.10);
            padding: 30px 14px 18px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .nav-brand {
            margin: 0 0 30px 8px;
            color: #2563eb;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0;
            line-height: 1.2;
        }

        .nav-menu {
            display: grid;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            min-height: 50px;
            border: none;
            background: transparent;
            color: #64748b;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-align: left;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #eaf2ff;
            color: #2563eb;
        }

        .nav-icon {
            width: 24px;
            text-align: center;
            font-size: 19px;
            line-height: 1;
        }

        .nav-auth {
            margin-top: auto;
            display: grid;
            gap: 8px;
            padding: 12px 8px 0;
            border-top: 1px solid #e5e7eb;
        }

        .nav-auth button {
            border: none;
            background: #eef4fb;
            color: #24425f;
            padding: 11px 12px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-align: left;
        }

        .nav-auth button:hover {
            background: var(--primary-color);
            color: white;
        }

        .nav-favorites {
            display: none;
            min-height: 0;
            margin: 18px 8px 0;
            padding-top: 14px;
            border-top: 1px solid #e5e7eb;
            overflow: hidden;
        }

        .nav-favorites.is-visible {
            display: flex;
            flex-direction: column;
        }

        .nav-favorites h3 {
            margin: 0 0 10px;
            font-size: 14px;
            color: #172033;
        }

        .nav-favorite-list {
            display: grid;
            gap: 8px;
            max-height: 34vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 3px;
        }

        .nav-favorite-card {
            width: 100%;
            border: 1px solid #e5e7eb;
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            overflow: hidden;
        }

        .nav-favorite-card:hover {
            border-color: #bfdbfe;
            background: #f8fbff;
        }

        .event-list-title {
            overflow: hidden;
            white-space: nowrap;
            line-height: 1.35;
        }

        .nav-favorite-title {
            overflow: hidden;
            white-space: nowrap;
            line-height: 1.35;
        }

        .marquee-title {
            display: block;
            width: 100%;
            overflow: hidden;
        }

        .marquee-title span {
            display: inline-block;
            padding-right: 36px;
        }

        .marquee-title.is-marquee span {
            animation: title-marquee var(--title-duration, 12s) linear infinite;
        }

        .marquee-title.is-marquee:hover span {
            animation-play-state: paused;
        }

        @keyframes title-marquee {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(calc(var(--title-shift, 0px) * -1));
            }
        }

        .nav-favorite-title {
            color: #172033;
            font-size: 13px;
            font-weight: 800;
        }

        .nav-favorite-time {
            margin-top: 6px;
            color: #2563eb;
            font-size: 12px;
            font-weight: 800;
        }

        .nav-favorite-empty {
            margin: 0;
            color: #64748b;
            font-size: 13px;
            line-height: 1.45;
        }

        .nav-auth span {
            display: block;
            color: #334155;
            font-weight: 800;
            padding: 0 4px 4px;
        }

        .account-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
            border: none;
            background: transparent;
            color: #111827;
            padding: 8px 12px;
            font-weight: 800;
            cursor: pointer;
            font-family: inherit;
        }

        .account-avatar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #eef2ff;
            color: #4f46e5;
            font-weight: 800;
        }

        .account-name {
            flex: 1;
            text-align: left;
        }

        .account-caret {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 46px;
            color: #4f46e5;
            font-size: 24px;
            line-height: 1;
        }

        .logout-menu {
            display: none;
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
            color: #ef4444;
            font-weight: 800;
            cursor: pointer;
        }

        .logout-menu.open {
            display: block;
        }

        .nav-auth .account-toggle {
            background: transparent;
            color: #111827;
            box-shadow: none;
            outline: none;
        }

        .nav-auth .account-toggle:hover {
            background: #f8fafc;
            color: #111827;
        }

        .nav-auth .account-avatar {
            display: inline-flex;
            color: #4f46e5;
            padding: 0;
        }

        .nav-auth .account-name,
        .nav-auth .account-caret {
            display: inline-block;
            padding: 0;
        }

        .panel-form {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .panel-form input {
            flex: 1;
            min-width: 0;
            border: 1px solid #d8dee6;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }

        .panel-form button {
            border: none;
            background: var(--primary-color);
            color: white;
            padding: 0 14px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
        }

        .panel-answer {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 14px;
            color: #333;
        }

        .panel-sources {
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid #e5e8eb;
        }

        .panel-sources a {
            display: block;
            margin-top: 6px;
            color: var(--primary-color);
            font-weight: 800;
            text-decoration: none;
        }

        .building-overlay {
            position: relative;
            width: 280px;
            max-height: 260px;
            overflow-y: auto;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            border: 1px solid #e5e8eb;
        }

        .building-overlay h3 {
            margin: 0 28px 12px 0;
            font-size: 18px;
        }

        .overlay-close {
            position: absolute;
            top: 10px;
            right: 10px;
            border: none;
            background: transparent;
            font-size: 20px;
            cursor: pointer;
        }

        .overlay-event {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 10px 0;
            border-top: 1px solid #edf0f2;
        }

        .overlay-event.is-favorite {
            margin: 0 -8px;
            padding: 10px 8px;
            border-radius: 8px;
            background: #fff8df;
        }

        .overlay-event-main {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            text-align: left;
            cursor: pointer;
            padding: 0;
        }

        .overlay-event strong {
            display: block;
            font-size: 14px;
            color: #333;
        }

        .overlay-event small,
        .overlay-empty {
            font-size: 12px;
            color: #777;
        }

        .event-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .favorite-star {
            border: none;
            background: transparent;
            color: #c8c8c8;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            padding: 0;
        }

        .favorite-star.active {
            color: #f4c542;
        }

        .event-detail-backdrop {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.42);
        }

        .event-detail-modal {
            position: relative;
            width: min(560px, 100%);
            max-height: 78vh;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #dfe5ee;
            border-radius: 8px;
            padding: 22px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.24);
        }

        .event-detail-modal h3 {
            margin: 0 32px 8px 0;
            font-size: 19px;
            line-height: 1.35;
            color: #071833;
        }

        .event-detail-time {
            margin: 0 0 16px;
            color: #2563eb;
            font-size: 14px;
            font-weight: 800;
        }

        .event-detail-body {
            white-space: pre-wrap;
            color: #40516b;
            font-size: 14px;
            line-height: 1.65;
        }

        .event-source-link {
            display: inline-block;
            margin-top: 16px;
            color: #2563eb;
            font-size: 14px;
            font-weight: 800;
            text-decoration: none;
        }
        #search-box {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;

            width: 420px;
            display: flex;
            gap: 8px;

            background: white;
            padding: 10px 12px;
            border-radius: 999px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.16);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
        }

        #search-box.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translate(-50%, -12px);
        }

        #search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px 12px;
            font-size: 14px;
        }

        #search-box button {
            border: none;
            background: var(--primary-color);
            color: white;
            padding: 10px 16px;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
        }

<body>

    <div class="wrapper">
        <div id="sidebar" class="hidden">
            <div class="header">
                <button class="sidebar-close-btn" onclick="closeSidebar()">×</button>
                <h1 id="sidebar-title">캠퍼스 버스 알리미</h1>
                <p id="sidebar-subtitle">실시간 학교 버스 위치와 시간표</p>
            </div>
            <div class="content" id="timetable-panel">
            </div>
        </div>

        <div id="map-container">
            <aside id="app-nav">
                <h2 class="nav-brand">DKU Campus</h2>
                <div class="nav-menu">
                    <button class="nav-item active" id="nav-home" onclick="showHomeView()"><span class="nav-icon">▦</span>Campus</button>
                    <button class="nav-item" id="nav-chat" onclick="location.href='/chatbot'"><span class="nav-icon">⊕</span>ChatBot</button>
                    <button class="nav-item" id="nav-event" onclick="location.href='/event'"><span class="nav-icon">□</span>Event</button>
                </div>
                <div id="nav-favorites" class="nav-favorites">
                    <h3>내 즐겨찾기</h3>
                    <div id="nav-favorite-list" class="nav-favorite-list">
                        <p class="nav-favorite-empty">저장한 행사가 없습니다.</p>
                    </div>
                </div>
                <div id="auth-buttons" class="nav-auth">
                    <button onclick="location.href='/login'">로그인</button>
                </div>
            </aside>

            <div id="search-box">
                 <input
                       type="text"
                       id="search-input"
                       placeholder="건물명 또는 행사명 검색"
                        onkeydown="handleSearchKey(event)"
                   >
                <button onclick="searchCampus()">검색</button>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script>
        var currentOverlay = null;
        var map = null;
        var defaultCenter = null;
        var defaultLevel = null;
        var favoriteEventIds = new Set();
        var campusBuildings = [];
        var currentBuilding = null;
        var currentBuildingEvents = [];
        var showBuildingOverlay = null;
        var debugPositionMode = false;
        var notificationAlertShown = false;

        function initMap() {
            kakao.maps.load(function () {
                var container = document.getElementById('map');

                var options = {
                    center: new kakao.maps.LatLng(37.3216, 127.1269),
                    level: 3,
                    draggable: false,
                    scrollwheel: false,
                    disableDoubleClick: true,
                    disableDoubleClickZoom: true
                };

                map = new kakao.maps.Map(container, options);

                map.setDraggable(false);
                map.setZoomable(false);

                defaultCenter = options.center;
                defaultLevel = options.level;

                var stations = [
                    {
                        name: "단국대정문",
                        lat: 37.32333200,
                        lng: 127.125957070,
                        stationId: "228001978"
                    },
                    {
                        name: "단국대.치과병원",
                        lat: 37.32230530,
                        lng: 127.12550406,
                        stationId: "228001737"
                    },
                    {
                        name: "단국대.인문관",
                        lat: 37.322212227,
                        lng: 127.12827934,
                        stationId: "228001981"
                    },
                    {
                        name: "단국대.종합실험동",
                        lat: 37.32023267,
                        lng: 127.1257488,
                        stationId: "228001979"

        async function loadBusArrival(station) {
            const serviceKey = "b109eeddfb82499c9fe238943b8bc0022b8c44c95461c2d64cd8897712bf48b2";

            const url =
                `https://apis.data.go.kr/6410000/busarrivalservice/v2/getBusArrivalListv2?format=json&serviceKey=${serviceKey}&stationId=${station.stationId}`;

            document.getElementById("sidebar").classList.remove("hidden");
            document.getElementById("sidebar-title").innerText = "버스 도착 정보";
            document.getElementById("sidebar-subtitle").innerText = station.name;
            document.getElementById("timetable-panel").innerHTML = [
                `<p>버스 정보를 불러오는 중...</p>`
            ].join("");

            try {
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error("버스 API 응답 오류");
                }

                const data = await response.json();

                let list = data.response?.msgBody?.busArrivalList || [];

                if (!Array.isArray(list)) {
                    list = [list];
                }

                console.log("버스 API 원본 응답:", data);
                console.log("필터 전 버스 목록:", list);

                const allowedBusNumbers = ["24", "720-3", "502"];

                list = list.filter(function (bus) {
                    const routeName = String(bus.routeName || "").trim();
                    return allowedBusNumbers.includes(routeName);
                });

                let html = [
                    `<h3>${station.name}</h3>`
                ].join("");

                if (list.length === 0) {
                    html += `<p class="overlay-empty">24, 720-3, 502번 도착 정보가 없습니다.</p>`;
                }

                list.forEach(function (bus) {
                    const routeName = bus.routeName || "노선명 없음";

                    const time1 = bus.predictTime1 !== "" && bus.predictTime1 !== undefined
                        ? `${bus.predictTime1}분 후`
                        : "도착 정보 없음";

                    const time2 = bus.predictTime2 !== "" && bus.predictTime2 !== undefined
                        ? `${bus.predictTime2}분 후`
                        : "도착 정보 없음";

                    html += [
                        `<div class="bus-card">`,
                        `<div class="bus-name">${routeName}</div>`,
                        `<div class="arrival-time">첫 번째 버스: ${time1}</div>`,
                        `<div class="arrival-time">두 번째 버스: ${time2}</div>`,
                        `</div>`
                    ].join("");
                });

                document.getElementById("timetable-panel").innerHTML = html;
            } catch (error) {
                console.error(error);

                document.getElementById("timetable-panel").innerHTML = [
                    `<p class="overlay-empty">버스 정보를 불러오지 못했습니다.</p>`
                ].join("");
            }
        }



        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function splitEventDescription(description) {
            const text = String(description || "").trim();
            const sourceMatch = text.match(/\n*원문:\s*(https?:\/\/\S+)\s*$/);

            if (!sourceMatch) {
                return { body: text, sourceUrl: "" };
            }

            return {
                body: text.slice(0, sourceMatch.index).trim(),
                sourceUrl: sourceMatch[1]
            };
        }

        function normalizeTitleText(value) {
            return String(value || "")
                .replace(/\[[^\]]+\]/g, "")
                .replace(/[^\p{L}\p{N}]+/gu, "")
                .toLowerCase();
        }

        function removeRepeatedTitleLines(body, title) {
            const titleText = normalizeTitleText(title);
            const lines = String(body || "").split(/\n+/);

            while (lines.length > 0) {
                const lineText = normalizeTitleText(lines[0]);
                if (!lineText) {
                    lines.shift();
                    continue;
                }
                if (
                    lineText === titleText
                    || titleText.includes(lineText)
                    || lineText.includes(titleText)
                ) {
                    lines.shift();
                    continue;
                }
                break;
            }

            return lines.join("\n").trim();
        }

        function removeSourceText(value) {
            const text = String(value || "");
            const markerIndex = text.indexOf("참고 출처:");
            if (markerIndex === -1) return text.trim();
            return text.slice(0, markerIndex).trim();
        }

        function renderPanelAnswer(data, targetId) {
            const target = document.getElementById(targetId);

            if (!target) return;

            if (data.detail || data.error) {
                target.textContent = data.detail || data.error;
                return;
            }

            const body = escapeHtml(removeSourceText(data.answer || "응답이 없습니다."));
            const sources = Array.isArray(data.sources) ? data.sources : [];

            if (sources.length === 0) {
                target.innerHTML = body;
                return;
            }

            const links = sources
                .filter(function (source) { return source && source.source_url; })
                .map(function (source, index) {
                    const title = escapeHtml(source.title || "출처 " + (index + 1));
                    const url = escapeHtml(source.source_url);
                    return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">[' + (index + 1) + '] ' + title + '</a>';
                })
                .join("");

            target.innerHTML = body + '<div class="panel-sources"><strong>참고 출처</strong>' + links + '</div>';
        }

        function prepareMarqueeTitles() {
            document.querySelectorAll(".marquee-title").forEach(function (title) {
                const text = title.querySelector("span");
                if (!text) {
                    return;
                }

                title.classList.remove("is-marquee");
                title.style.removeProperty("--title-shift");
                title.style.removeProperty("--title-duration");

                const shift = text.scrollWidth - title.clientWidth;
                if (shift > 8) {
                    const travel = shift + 36;
                    const duration = Math.max(6, travel / 18);
                    title.style.setProperty("--title-shift", `${travel}px`);
                    title.style.setProperty("--title-duration", `${duration}s`);
                    title.classList.add("is-marquee");
                }
            });
        }

            if (!token) {

            try {

                    button.disabled = true;
                }

                const response = await fetch(`/favorites/${eventId}`, {
                    method: method,
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    const data = await response.json();
                    alert(data.detail || "즐겨찾기 처리 중 오류가 발생했습니다.");
                    return;
                }

                if (isFavorite) {
                    favoriteEventIds.delete(eventId);
                    setFavoriteStarState(eventId, false);
                } else {
                    favoriteEventIds.add(eventId);
                    setFavoriteStarState(eventId, true);
                }
                await renderNavFavorites();
                if (currentBuilding) {
                    await showBuildingOverlay(currentBuilding);
                }
            } catch (error) {
                console.error(error);
                alert("즐겨찾기 요청에 실패했습니다.");
            } finally {
                if (button) {
                    button.disabled = false;
                }
            }
        }

        async function openFavoriteList() {
            const token = localStorage.getItem("access_token");

            if (!token) {
                location.href = "/login";
                return;
            }

            try {
                const response = await fetch("/favorites", {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    alert("즐겨찾기 목록을 불러오지 못했습니다.");
                    return;
                }

                const favorites = await response.json();

                document.getElementById("sidebar").classList.remove("hidden");
                document.getElementById("sidebar-title").innerText = "내 즐겨찾기";
                document.getElementById("sidebar-subtitle").innerText = "저장한 행사 일정";

                let favoriteHtml = "";

                if (favorites.length === 0) {
                    favoriteHtml = `<p class="overlay-empty">즐겨찾기한 일정이 없습니다.</p>`;
                } else {
                    favorites.forEach(function (event) {
                        favoriteHtml += [
                            `<div class="bus-card" onclick="moveToFavoriteBuilding(${event.building_id})">`,
                            `<div class="event-title-row">`,
                            `<div class="bus-name event-list-title marquee-title"><span>${escapeHtml(event.title)}</span></div>`,
                            `<button class="favorite-star active" data-event-id="${event.event_id}" onclick="event.stopPropagation(); removeFavoriteFromList(${event.event_id}, this)">★</button>`,
                            `</div>`,
                            `<div class="arrival-time">${escapeHtml(formatDateTime(event.start_datetime))} ~ ${escapeHtml(formatDateTime(event.end_datetime))}</div>`,
                            `</div>`
                        ].join("");
                    });
                }

                document.getElementById("timetable-panel").innerHTML = favoriteHtml;
            } catch (error) {
                console.error(error);
                alert("즐겨찾기 목록 요청에 실패했습니다.");
            }
        }

        function moveToFavoriteBuilding(buildingId) {
            const building = campusBuildings.find(function (item) {
                return item.building_id === buildingId;
            });

            if (!building || !map) {
                return;
            }

            closeSidebar();

            showBuildingOverlay(building);
        }

        async function removeFavoriteFromList(eventId, button) {
            const token = localStorage.getItem("access_token");

            if (!token) {
                alert("로그인 후 이용해주세요.");
                location.href = "/login";
                return;
            }

            try {
                const response = await fetch(`/favorites/${eventId}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    alert("즐겨찾기 삭제에 실패했습니다.");
                    return;
                }

                favoriteEventIds.delete(eventId);
                setFavoriteStarState(eventId, false);

                const eventBox = button.closest(".bus-card");

                if (eventBox) {
                    eventBox.remove();
                }
                await renderNavFavorites();

                const panel = document.getElementById("timetable-panel");

                if (panel && panel.children.length === 0) {
                    panel.innerHTML = `<p class="overlay-empty">즐겨찾기한 일정이 없습니다.</p>`;
                }
            } catch (error) {
                console.error(error);
                alert("즐겨찾기 삭제 요청에 실패했습니다.");
            }
        }

        function closeBuildingOverlay() {
            closeEventDetail();
            setSearchBoxHidden(false);

            if (currentOverlay) {
                currentOverlay.setMap(null);
                currentOverlay = null;
            }
            currentBuilding = null;

            if (map && defaultCenter && defaultLevel) {
                map.setCenter(defaultCenter);
                map.setLevel(defaultLevel);
            }
        }

        function formatDateTime(value) {
            if (!value) {
                return "";
            }

            return String(value).replace("T", " ").slice(0, 16);
        }

        const kakaoScript = document.createElement('script');
        kakaoScript.src = "https://dapi.kakao.com/v2/maps/sdk.js?appkey=da25ccc59a0513e63b964a69e8709fd9&autoload=false";
        kakaoScript.onload = initMap;
        kakaoScript.onerror = function () {
            console.error("카카오 지도 SDK 로드 실패");
            document.getElementById('map').innerHTML = `
            <div style="padding: 40px; font-size: 18px;">
                카카오 지도를 불러오지 못했습니다.
            </div>
        `;
        };
        document.head.appendChild(kakaoScript);

        function updateAuthButtons() {
            const token = localStorage.getItem("access_token");
            const name = localStorage.getItem("name");
            const authButtons = document.getElementById("auth-buttons");

            if (!authButtons) {
                return;
            }

            if (token && name) {
                authButtons.innerHTML = [
                    '<div class="logout-menu" id="logout-menu" onclick="logout()">↪ 로그아웃</div>',
                    '<button class="account-toggle" onclick="toggleAccountMenu()">',
                    '<span class="account-avatar">' + escapeHtml(name.slice(0, 1)) + '</span>',
                    '<span class="account-name">' + escapeHtml(name) + '</span>',
                    '<span class="account-caret" id="account-caret"></span>',
                    '</button>'
                ].join("");

                renderNavFavorites();
                showNotificationAlerts();
            } else {
                authButtons.innerHTML = '<button onclick="location.href=\'/login\'">로그인</button>';
                renderNavFavorites();
            }
        }

        function toggleAccountMenu() {
            const menu = document.getElementById("logout-menu");
            const caret = document.getElementById("account-caret");

            if (!menu || !caret) {
                return;
            }

            const isOpen = menu.classList.toggle("open");
            caret.classList.toggle("is-open", isOpen);
        }

        function logout() {
            localStorage.removeItem("access_token");
            localStorage.removeItem("name");

            favoriteEventIds = new Set();

            document.querySelectorAll(".favorite-star").forEach(function (button) {
                button.classList.remove("active");
            });

            closeBuildingOverlay();
            updateAuthButtons();
        }

        window.addEventListener("DOMContentLoaded", function () {
            updateAuthButtons();
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                closeEventDetail();
                closeBuildingOverlay();
                closeSidebar();
            }
        });

        
        function handleSearchKey(event) {
            if (event.key === "Enter") {
                searchCampus();
            }
        }

        async function searchCampus() {
           const keyword = document
               .getElementById("search-input")
               .value
               .trim();

            if (!keyword) {
                alert("검색어를 입력해주세요.");
                return;
            }

        const building = campusBuildings.find(function (item) {
            return item.name.includes(keyword);
        });

        if (building) {
            showBuildingOverlay(building);
            return;
        }

        try {
            const response = await fetch("/events");
            const events = await response.json();

            const event = events.find(function (item) {
               return item.title.includes(keyword)
                  || (item.description && item.description.includes(keyword));
            });

            if (!event) {
                alert("검색 결과가 없습니다.");
                return;
            }

            const eventBuilding = campusBuildings.find(function (item) {
                return item.building_id === event.building_id;
            });

            if (!eventBuilding) {
                alert("행사는 찾았지만 해당 건물 정보를 찾을 수 없습니다.");
                return;
            }

            showBuildingOverlay(eventBuilding);
        } catch (error) {
            console.error(error);
            alert("검색 중 오류가 발생했습니다.");
        }
    }
    </script>
</body>
