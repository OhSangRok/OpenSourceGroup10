<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>로그인</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f5f7fb;
            --text-color: #222;
            --sub-text: #666;
            --border-color: #dde3ea;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #edf4ff, #f8f9fa);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            width: 380px;
            background: white;
            padding: 34px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .auth-box h1 {
            margin: 0 0 8px;
            font-size: 28px;
            color: var(--text-color);
        }

        .auth-box .subtitle {
            margin: 0 0 24px;
            font-size: 14px;
            color: var(--sub-text);
        }

        .auth-box input {
            width: 100%;
            box-sizing: border-box;
            padding: 13px 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        .auth-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.16);
        }

        .auth-box button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: var(--primary-color);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
        }

        .auth-box button:hover {
            background: #357ABD;
        }

        .auth-box .secondary-button {
            background: #eef2f6;
            color: #333;
            margin-top: 10px;
        }

        .auth-box .secondary-button:hover {
            background: #dde5ee;
        }

        #message {
            min-height: 20px;
            margin: 14px 0 0;
            font-size: 14px;
            color: #e74c3c;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="auth-box">
        <h1>로그인</h1>
        <p class="subtitle">학번과 비밀번호를 입력하세요.</p>

        <input id="student_id" placeholder="학번">
        <input id="password" type="password" placeholder="비밀번호">

        <button onclick="login()">로그인</button>
        <button class="secondary-button" onclick="location.href='/register'">회원가입</button>
        <button class="secondary-button" onclick="location.href='/'">메인으로</button>

        <p id="message"></p>
    </div>

    <script>
        async function login() {
            const student_id = document.getElementById("student_id").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    student_id: student_id,
                    password: password
                })
            });

            const data = await response.json();

            if (data.access_token) {
                localStorage.setItem("access_token", data.access_token);
                localStorage.setItem("name", data.name);
                location.href = "/";
                return;
            }

            document.getElementById("message").innerText = data.message || "로그인에 실패했습니다.";
        }
    </script>
</body>

</html>
