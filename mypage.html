<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>My Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f5f7fb;
            --text-color: #172033;
            --sub-text: #64748b;
            --border-color: #e5e7eb;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
        }

        body.modal-open {
            overflow: hidden;
            padding-right: var(--modal-scrollbar-width, 0px);
        }

        #app-nav {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 120;
            width: 292px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 5px 0 18px rgba(15, 23, 42, 0.10);
            padding: 30px 14px 18px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .nav-brand {
            margin: 0 0 30px 8px;
            color: #2563eb;
            font-size: 24px;
            font-weight: 800;
        }

        .nav-menu {
            display: grid;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            min-height: 50px;
            border: none;
            background: transparent;
            color: #64748b;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-align: left;
            text-decoration: none;
            box-sizing: border-box;
            font-family: inherit;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #eaf2ff;
            color: #2563eb;
        }

        .nav-icon {
            width: 24px;
            text-align: center;
            font-size: 19px;
            line-height: 1;
        }

        .nav-auth {
            margin-top: auto;
            display: grid;
            gap: 8px;
            padding: 12px 8px 0;
            border-top: 1px solid var(--border-color);
        }

        .nav-auth button {
            border: none;
            background: #eef4fb;
            color: #24425f;
            padding: 11px 12px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
        }

        .nav-auth button:hover {
            background: var(--primary-color);
            color: white;
        }

        .account-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #111827;
            padding: 8px 12px;
            font-weight: 800;
            cursor: pointer;
            font-family: inherit;
        }

        .account-avatar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            min-width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #eef2ff;
            color: #4f46e5;
            font-weight: 800;
        }

        .account-name {
            flex: 1;
            text-align: left;
        }

        .account-caret {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 46px;
            color: #4f46e5;
            font-size: 24px;
            line-height: 1;
        }

        .account-caret.is-open {
            transform: none;
        }

        .logout-menu {
            display: none;
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
            color: #ef4444;
            font-weight: 800;
            cursor: pointer;
        }

        .logout-menu.open {
            display: block;
        }

        .page {
            margin-left: 292px;
            min-height: 100vh;
            padding: 34px 40px 60px;
            box-sizing: border-box;
        }

        .page-inner {
            width: min(920px, 100%);
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 34px;
        }

        .page-desc {
            margin: 0 0 24px;
            color: var(--sub-text);
            font-size: 15px;
        }

        .section-grid {
            display: grid;
            gap: 18px;
        }

        .panel {
            background: white;
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            border: 1px solid var(--border-color);
        }

        .panel h2 {
            margin: 0 0 14px;
            font-size: 21px;
            color: #172033;
        }

        .empty-text {
            margin: 0;
            color: var(--sub-text);
            font-size: 14px;
            line-height: 1.6;
        }

        .schedule-list {
            display: grid;
            gap: 10px;
        }

        .schedule-card {
            border: 1px solid #eef2f7;
            border-radius: 10px;
            padding: 14px 16px;
            background: #ffffff;
            cursor: default;
        }

        .favorite-card {
            cursor: pointer;
        }

        .favorite-card:hover {
            border-color: #bfdbfe;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.10);
        }

        .schedule-card-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .schedule-card-main {
            min-width: 0;
            flex: 1;
        }

        .schedule-title {
            font-size: 16px;
            font-weight: 800;
            color: #172033;
            margin-bottom: 7px;
        }

        .schedule-date {
            color: #2563eb;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .schedule-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            color: var(--sub-text);
            font-size: 13px;
            font-weight: 700;
        }

        .schedule-memo {
            color: var(--sub-text);
            font-size: 14px;
            line-height: 1.5;
        }

        .personal-card .delete-button {
            flex: 0 0 auto;
            border: none;
            border-radius: 8px;
            background: #fee2e2;
            color: #dc2626;
            padding: 9px 12px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }

        .personal-card .delete-button:hover {
            background: #dc2626;
            color: #ffffff;
        }

        .form-grid {
            position: relative;
            display: grid;
            gap: 12px;
        }

        .building-search-wrap {
            position: relative;
        }

        .building-results {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            z-index: 20;
            display: none;
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid #d6dde6;
            border-radius: 10px;
            background: white;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.16);
        }

        .building-results.is-open {
            display: block;
        }

        .building-result {
            width: 100%;
            border: none;
            background: white;
            padding: 11px 14px;
            color: #172033;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
        }

        .building-result:hover {
            background: #eaf2ff;
            color: #2563eb;
        }

        input,
        select,
        textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d6dde6;
            border-radius: 10px;
            padding: 13px 14px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.16);
        }

        .detail-backdrop {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.42);
        }

        .detail-modal {
            position: relative;
            width: min(620px, 100%);
            max-height: 78vh;
            overflow: hidden;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.24);
        }

        .detail-close {
            position: absolute;
            top: 12px;
            right: 14px;
            border: none;
            background: transparent;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
        }

        .detail-modal h3 {
            margin: 0 36px 10px 0;
            font-size: 22px;
            line-height: 1.35;
        }

        .detail-body {
            margin-top: 16px;
            max-height: 42vh;
            overflow: hidden;
            white-space: pre-wrap;
            color: #40516b;
            font-size: 14px;
            line-height: 1.65;
        }

        .panel-source {
            display: inline-block;
            margin-top: 16px;
            color: #2563eb;
            font-size: 14px;
            font-weight: 800;
            text-decoration: none;
        }

        .primary-button {
            border: none;
            border-radius: 10px;
            background: var(--primary-color);
            color: white;
            padding: 13px 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            font-family: inherit;
        }

        .primary-button:hover {
            background: #357ABD;
        }

        .login-required {
            text-align: center;
            padding: 40px 20px;
        }

        .login-required h2 {
            margin: 0 0 10px;
        }

        .login-required p {
            margin: 0 0 18px;
            color: var(--sub-text);
        }

<body>
    <aside id="app-nav">
        <h2 class="nav-brand">DKU Campus</h2>

        <div class="nav-menu">
            <a class="nav-item" href="/"><span class="nav-icon">▦</span>Campus</a>
            <a class="nav-item" href="/chatbot"><span class="nav-icon">⊕</span>ChatBot</a>
            <a class="nav-item" href="/event"><span class="nav-icon">□</span>Event</a>
            <a class="nav-item active" href="/mypage"><span class="nav-icon">▣</span>My Page</a>
        </div>

        <div id="auth-buttons" class="nav-auth">
            <button onclick="location.href='/login'">로그인</button>
        </div>
    </aside>

    <main class="page">
        <div class="page-inner">
            <h1>My Page</h1>
            <p class="page-desc">즐겨찾기한 행사와 개인 일정을 한 곳에서 관리할 수 있습니다.</p>

            <div id="login-required" class="panel login-required" style="display:none;">
                <h2>로그인이 필요합니다</h2>
                <p>마이페이지는 로그인 후 이용할 수 있습니다.</p>
                <button class="primary-button" onclick="location.href='/login'">로그인하기</button>
            </div>

            <div id="mypage-content" class="section-grid">
                <section class="panel">
                    <h2>⭐ 즐겨찾기 행사</h2>
                    <div id="favorite-list" class="schedule-list">
                        <p class="empty-text">즐겨찾기 행사를 불러오는 중...</p>
                    </div>
                </section>

                <section class="panel">
                    <h2>📅 내 일정</h2>
                    <div id="personal-schedule-list" class="schedule-list">
                        <p class="empty-text">등록된 개인 일정이 없습니다.</p>
                    </div>
                </section>

                <section class="panel">
                    <h2>➕ 일정 추가</h2>
                    <div class="form-grid">
                        <input id="schedule-title" type="text" placeholder="일정 제목">
                        <input id="schedule-date" type="date">
                        <select id="schedule-time">
                            <option value="">시간 선택</option>
                        </select>
                        <div class="building-search-wrap">
                            <input id="schedule-building-search" type="text" placeholder="건물 검색">
                            <input id="schedule-building" type="hidden">
                            <div id="building-results" class="building-results"></div>
                        </div>
                        <textarea id="schedule-memo" placeholder="메모"></textarea>
                        <button class="primary-button" onclick="createPersonalSchedule()">일정 추가</button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        let favoriteEvents = [];
        let personalSchedules = [];
        let buildingOptions = [];

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function splitSource(description) {
            const text = String(description || "").trim();
            const sourceMatch = text.match(/\n*원문:\s*(https?:\/\/\S+)\s*$/);

            if (!sourceMatch) {
                return { body: text, sourceUrl: "" };
            }

            return {
                body: text.slice(0, sourceMatch.index).trim(),
                sourceUrl: sourceMatch[1]
            };
        }

        function openFavoriteDetail(index) {
            const event = favoriteEvents[index];

            if (!event) return;

            closeDetailModal();

            const detail = splitSource(event.description);
            const sourceHtml = detail.sourceUrl
                ? '<a class="panel-source" href="' + escapeHtml(detail.sourceUrl) + '" target="_blank" rel="noopener noreferrer">원문 보기</a>'
                : "";

            const backdrop = document.createElement("div");
            backdrop.className = "detail-backdrop";
            backdrop.id = "detail-backdrop";
            backdrop.onclick = function (clickEvent) {
                if (clickEvent.target === backdrop) {
                    closeDetailModal();
                }
            };
            backdrop.innerHTML = [
                '<div class="detail-modal">',
                '<button class="detail-close" onclick="closeDetailModal()">×</button>',
                '<h3>' + escapeHtml(event.title) + '</h3>',
                '<div class="schedule-meta">',
                '<span>' + escapeHtml(event.building_name || "장소 미정") + '</span>',
                '<span>' + escapeHtml(formatDateTime(event.start_datetime)) + ' ~ ' + escapeHtml(formatDateTime(event.end_datetime)) + '</span>',
                '</div>',
                '<div class="detail-body">' + escapeHtml(detail.body || "상세 내용이 없습니다.") + '</div>',
                sourceHtml,
                '</div>'
            ].join("");

            document.body.appendChild(backdrop);
            document.body.style.setProperty("--modal-scrollbar-width", Math.max(0, window.innerWidth - document.documentElement.clientWidth) + "px");
            document.body.classList.add("modal-open");
        }

        function openPersonalScheduleDetail(index) {
            const schedule = personalSchedules[index];

            if (!schedule) return;

            closeDetailModal();

            const timeText = formatScheduleTime(schedule.schedule_time);
            const placeText = schedule.building_name || "장소 미정";
            const memoText = schedule.memo || "메모가 없습니다.";

            const backdrop = document.createElement("div");
            backdrop.className = "detail-backdrop";
            backdrop.id = "detail-backdrop";
            backdrop.onclick = function (clickEvent) {
                if (clickEvent.target === backdrop) {
                    closeDetailModal();
                }
            };
            backdrop.innerHTML = [
                '<div class="detail-modal">',
                '<button class="detail-close" onclick="closeDetailModal()">×</button>',
                '<h3>' + escapeHtml(schedule.title) + '</h3>',
                '<div class="schedule-meta">',
                '<span>' + escapeHtml(placeText) + '</span>',
                '<span>' + escapeHtml([formatDate(schedule.schedule_date), timeText].filter(Boolean).join(" ")) + '</span>',
                '</div>',
                '<div class="detail-body">' + escapeHtml(memoText) + '</div>',
                '</div>'
            ].join("");

            document.body.appendChild(backdrop);
            document.body.style.setProperty("--modal-scrollbar-width", Math.max(0, window.innerWidth - document.documentElement.clientWidth) + "px");
            document.body.classList.add("modal-open");
        }

        function closeDetailModal() {
            const backdrop = document.getElementById("detail-backdrop");
            if (backdrop) {
                backdrop.remove();
            }
            document.body.classList.remove("modal-open");
            document.body.style.removeProperty("--modal-scrollbar-width");
        }

        function updateAuthButtons() {
            const token = localStorage.getItem("access_token");
            const name = localStorage.getItem("name");
            const authButtons = document.getElementById("auth-buttons");

            if (!authButtons) return;

            if (token && name) {
                authButtons.innerHTML = [
                    '<div class="logout-menu" id="logout-menu" onclick="logout()">↪ 로그아웃</div>',
                    '<button class="account-toggle" onclick="toggleAccountMenu()">',
                    '<span class="account-avatar">' + escapeHtml(name.slice(0, 1)) + '</span>',
                    '<span class="account-name">' + escapeHtml(name) + '</span>',
                    '<span class="account-caret" id="account-caret"></span>',
                    '</button>'
                ].join("");
            } else {
                authButtons.innerHTML = '<button onclick="location.href=\'/login\'">로그인</button>';
            }
        }

        function toggleAccountMenu() {
            const menu = document.getElementById("logout-menu");
            const caret = document.getElementById("account-caret");

            if (!menu || !caret) return;

            const isOpen = menu.classList.toggle("open");
            caret.classList.toggle("is-open", isOpen);
        }

        function logout() {
            localStorage.removeItem("access_token");
            localStorage.removeItem("name");
            updateAuthButtons();
            checkLogin();
        }

        function checkLogin() {
            const token = localStorage.getItem("access_token");
            const loginRequired = document.getElementById("login-required");
            const mypageContent = document.getElementById("mypage-content");

            if (!token) {
                loginRequired.style.display = "block";
                mypageContent.style.display = "none";
                return false;
            }

            loginRequired.style.display = "none";
            mypageContent.style.display = "grid";
            return true;
        }

        async function loadFavorites() {
            const token = localStorage.getItem("access_token");
            const list = document.getElementById("favorite-list");

            if (!token) return;

            try {
                const response = await fetch("/favorites", {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    list.innerHTML = '<p class="empty-text">즐겨찾기 행사를 불러오지 못했습니다.</p>';
                    return;
                }

                const favorites = await response.json();
                favoriteEvents = favorites;

                if (!Array.isArray(favorites) || favorites.length === 0) {
                    list.innerHTML = '<p class="empty-text">즐겨찾기한 행사가 없습니다.</p>';
                    return;
                }

                list.innerHTML = favorites.map(function (event, index) {
                    return [
                        '<div class="schedule-card favorite-card" onclick="openFavoriteDetail(' + index + ')">',
                        '<div class="schedule-title">' + escapeHtml(event.title) + '</div>',
                        '<div class="schedule-meta">',
                        '<span>' + escapeHtml(event.building_name || "장소 미정") + '</span>',
                        '<span>' + escapeHtml(formatDateTime(event.start_datetime)) + '</span>',
                        '</div>',
                        '</div>'
                    ].join("");
                }).join("");
            } catch (error) {
                console.error(error);
                list.innerHTML = '<p class="empty-text">즐겨찾기 요청에 실패했습니다.</p>';
            }
        }

        async function loadPersonalSchedules() {
            const token = localStorage.getItem("access_token");
            const list = document.getElementById("personal-schedule-list");

            if (!token) return;
        
            try {
                const response = await fetch("/personal-schedules", {
                    headers: {
                        "Authorization": `Bearer ${token}`
                      }
                });

                if (!response.ok) {
                    list.innerHTML = '<p class="empty-text">개인 일정을 불러오지 못했습니다.</p>';
                    return;
                }

                const schedules = await response.json();
                personalSchedules = Array.isArray(schedules) ? schedules : [];

                if (personalSchedules.length === 0) {
                    list.innerHTML = '<p class="empty-text">등록된 개인 일정이 없습니다.</p>';
                    return;
                }

                list.innerHTML = personalSchedules.map(function (schedule, index) {
                    const timeText = formatScheduleTime(schedule.schedule_time);
                    const placeText = schedule.building_name || "장소 미정";
                    return [
                        '<div class="schedule-card favorite-card personal-card" onclick="openPersonalScheduleDetail(' + index + ')">',
                        '<div class="schedule-card-row">',
                        '<div class="schedule-card-main">',
                        '<div class="schedule-title">' + escapeHtml(schedule.title) + '</div>',
                        '<div class="schedule-meta">',
                        '<span>' + escapeHtml(placeText) + '</span>',
                        '<span>' + escapeHtml([formatDate(schedule.schedule_date), timeText].filter(Boolean).join(" ")) + '</span>',
                        '</div>',
                        '</div>',
                        '<button class="delete-button" onclick="event.stopPropagation(); deletePersonalSchedule(' + schedule.schedule_id + ')">삭제</button>',
                        '</div>',
                        '</div>'
                    ].join("");
                }).join("");

            } catch (error) {
                console.error(error);
                list.innerHTML = '<p class="empty-text">개인 일정 요청에 실패했습니다.</p>';
            }
        }

        function populateTimeSelect() {
            const select = document.getElementById("schedule-time");
            if (!select) return;

            const options = ['<option value="">시간 선택</option>'];
            for (let hour = 9; hour <= 21; hour += 1) {
                for (const minute of [0, 30]) {
                    if (hour === 21 && minute === 30) {
                        continue;
                    }
                    const value = String(hour).padStart(2, "0") + ":" + String(minute).padStart(2, "0");
                    options.push('<option value="' + value + '">' + value + '</option>');
                }
            }
            select.innerHTML = options.join("");
        }

        async function loadBuildingSelect() {
            const hiddenInput = document.getElementById("schedule-building");
            const searchInput = document.getElementById("schedule-building-search");
            const resultBox = document.getElementById("building-results");
            if (!hiddenInput || !searchInput || !resultBox) return;

            try {
                const response = await fetch("/buildings");
                if (!response.ok) {
                    return;
                }

                const seenBuildings = new Set();
                buildingOptions = (await response.json()).filter(function (building) {
                    const key = String(building.building_name || "").replace(/\s+/g, "").toLowerCase();
                    if (!key || seenBuildings.has(key)) {
                        return false;
                    }
                    seenBuildings.add(key);
                    return true;
                });

                searchInput.addEventListener("input", function () {
                    hiddenInput.value = "";
                    renderBuildingResults(searchInput.value);
                });

                searchInput.addEventListener("focus", function () {
                    renderBuildingResults(searchInput.value);
                });

                document.addEventListener("click", function (event) {
                    if (!event.target.closest(".building-search-wrap")) {
                        resultBox.classList.remove("is-open");
                    }
                });
            } catch (error) {
                console.error(error);
            }
        }

        function renderBuildingResults(keyword) {
            const resultBox = document.getElementById("building-results");
            const hiddenInput = document.getElementById("schedule-building");
            const searchInput = document.getElementById("schedule-building-search");
            const normalized = String(keyword || "").replace(/\s+/g, "").toLowerCase();

            if (!resultBox || !hiddenInput || !searchInput) return;

            const matches = buildingOptions.filter(function (building) {
                const name = String(building.building_name || "");
                return !normalized || name.replace(/\s+/g, "").toLowerCase().includes(normalized);
            }).slice(0, 8);

            if (matches.length === 0) {
                resultBox.innerHTML = '<div class="building-result">검색 결과가 없습니다.</div>';
                resultBox.classList.add("is-open");
                return;
            }

            resultBox.innerHTML = matches.map(function (building) {
                return '<button type="button" class="building-result" data-building-id="' + building.building_id + '" data-building-name="' + escapeHtml(building.building_name) + '">' + escapeHtml(building.building_name) + '</button>';
            }).join("");

            resultBox.querySelectorAll(".building-result[data-building-id]").forEach(function (button) {
                button.addEventListener("click", function () {
                    hiddenInput.value = button.dataset.buildingId;
                    searchInput.value = button.dataset.buildingName;
                    resultBox.classList.remove("is-open");
                });
            });
            resultBox.classList.add("is-open");
        }

        async function createPersonalSchedule() {
            const token = localStorage.getItem("access_token");

            if (!token) {
                alert("로그인 후 이용해주세요.");
                location.href = "/login";
                return;
            }

            const title = document.getElementById("schedule-title").value.trim();
            const date = document.getElementById("schedule-date").value;
            const time = document.getElementById("schedule-time").value;
            const buildingId = document.getElementById("schedule-building").value;
            const buildingName = document.getElementById("schedule-building-search").value.trim();
            const memo = document.getElementById("schedule-memo").value.trim();

            if (!title) {
                alert("일정 제목을 입력해주세요.");
                return;
            }

            if (!date) {
                alert("날짜를 선택해주세요.");
                return;
            }

            if (buildingName && !buildingId) {
                alert("검색 결과에 있는 건물을 선택해주세요.");
                return;
            }

            try {
                const response = await fetch("/personal-schedules", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title: title,
                        schedule_date: date,
                        schedule_time: time,
                        building_id: buildingId ? Number(buildingId) : null,
                        memo: memo
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.detail || "일정 추가에 실패했습니다.");
                    return;
                }
        
                document.getElementById("schedule-title").value = "";
                document.getElementById("schedule-date").value = "";
                document.getElementById("schedule-time").value = "";
                document.getElementById("schedule-building").value = "";
                document.getElementById("schedule-building-search").value = "";
                document.getElementById("building-results").classList.remove("is-open");
                document.getElementById("schedule-memo").value = "";

                await loadPersonalSchedules();

            } catch (error) {
                console.error(error);
                alert("일정 추가 요청에 실패했습니다.");
             }
        }

        async function deletePersonalSchedule(scheduleId) {
            const token = localStorage.getItem("access_token");

            if (!token) {
                alert("로그인 후 이용해주세요.");
                location.href = "/login";
                return;
                    }

            if (!confirm("이 일정을 삭제하시겠습니까?")) {
                return;
            }

            try {
                const response = await fetch(`/personal-schedules/${scheduleId}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.detail || "일정 삭제에 실패했습니다.");
                    return;
                }

                await loadPersonalSchedules();

            } catch (error) {
                console.error(error);
                alert("일정 삭제 요청에 실패했습니다.");
            }
        }

        function formatDate(value) {
            if (!value) return "";
            const text = String(value);
            const isoMatch = text.match(/\d{4}-\d{2}-\d{2}/);
            if (isoMatch) return isoMatch[0];

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return text.slice(0, 10);

            return [
                date.getFullYear(),
                String(date.getMonth() + 1).padStart(2, "0"),
                String(date.getDate()).padStart(2, "0")
            ].join("-");
        }
        function formatScheduleTime(value) {
            const match = String(value || "").match(/(\d{1,2}):(\d{2})/);
            if (!match) return "";
            return String(Number(match[1])).padStart(2, "0") + ":" + match[2];
        }
        function formatDateTime(value) {
            if (!value) return "";
            return String(value).replace("T", " ").slice(0, 16);
        }

       window.addEventListener("DOMContentLoaded", function () {
            updateAuthButtons();
            populateTimeSelect();
            loadBuildingSelect();

            if (checkLogin()) {
                loadFavorites();
                loadPersonalSchedules();
            }
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                closeDetailModal();
                const resultBox = document.getElementById("building-results");
                if (resultBox) {
                    resultBox.classList.remove("is-open");
                }
            }
        });
    </script>
