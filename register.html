<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>회원가입</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f5f7fb;
            --text-color: #222;
            --sub-text: #666;
            --border-color: #dde3ea;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #edf4ff, #f8f9fa);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            width: 380px;
            background: white;
            padding: 34px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .auth-box h1 {
            margin: 0 0 8px;
            font-size: 28px;
            color: var(--text-color);
        }

        .auth-box .subtitle {
            margin: 0 0 24px;
            font-size: 14px;
            color: var(--sub-text);
        }

        .auth-box input,
        .auth-box select {
            width: 100%;
            box-sizing: border-box;
            padding: 13px 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        .auth-box input:focus,
        .auth-box select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.16);
        }

        .auth-box button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: var(--primary-color);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
        }

        .auth-box button:hover {
            background: #357ABD;
        }

        .auth-box .secondary-button {
            background: #eef2f6;
            color: #333;
            margin-top: 10px;
        }

        .auth-box .secondary-button:hover {
            background: #dde5ee;
        }

        .error-field {
            border-color: #e74c3c !important;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.18) !important;
        }

        #message {
            min-height: 20px;
            margin: 14px 0 0;
            font-size: 14px;
            color: #e74c3c;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="auth-box">
        <h1>회원가입</h1>
        <p class="subtitle">학교 행사 서비스를 이용할 정보를 입력하세요.</p>

        <input id="student_id" placeholder="학번" required>
        <input id="password" type="password" placeholder="비밀번호" required>
        <input id="name" placeholder="이름" required>
        <select id="college" onchange="updateDepartments()" required>
            <option value="">단과대학 선택</option>
            <option value="문과대학">문과대학</option>
            <option value="법과대학">법과대학</option>
            <option value="사회과학대학">사회과학대학</option>
            <option value="경영경제대학">경영경제대학</option>
            <option value="공과대학">공과대학</option>
            <option value="SW융합대학">SW융합대학</option>
            <option value="사범대학">사범대학</option>
            <option value="음악예술대학">음악예술대학</option>
            <option value="프리무스국제대학">프리무스국제대학</option>
            <option value="퇴계혁신칼리지">퇴계혁신칼리지</option>
        </select>
        <select id="department" required>
            <option value="">학과 선택</option>
        </select>
        <select id="grade" required>
            <option value="">학년 선택</option>
            <option value="1">1학년</option>
            <option value="2">2학년</option>
            <option value="3">3학년</option>
            <option value="4">4학년</option>
        </select>

        <button onclick="register()">가입하기</button>
        <button class="secondary-button" onclick="location.href='/login'">로그인으로</button>
        <button class="secondary-button" onclick="location.href='/'">메인으로</button>

        <p id="message"></p>
    </div>

    <script>
        const departmentsByCollege = {
            "문과대학": ["국어국문학과", "사학과", "철학과", "영미인문학과"],
            "사회과학대학": ["정치외교학과", "행정학과", "도시지역계획학전공", "부동산학전공", "저널리즘전공", "영상콘텐츠전공", "광고홍보전공", "상담학과"],
            "경영경제대학": ["경제학과", "무역학과", "경영학전공", "회계학전공", "산업경영학과(야간)"],
            "공과대학": ["전자전기공학과", "융합반도체공학과", "고분자공학전공", "파이버융합소재공학전공", "토목환경공학과", "기계공학과", "화학공학과", "건축학전공", "건축공학전공"],
            "SW융합대학": ["소프트웨어학과", "컴퓨터공학과", "통계데이터사이언스학과", "사이버보안학과", "SW융합학부"],
            "사범대학": ["한문교육과", "특수교육과", "수학교육과", "과학교육과", "체육교육과", "교직교육과"],
            "음악예술대학": ["도예과", "커뮤니케이션디자인전공", "패션산업디자인전공", "연극전공", "영화전공", "뮤지컬전공", "무용과", "피아노전공", "관현악전공", "성악전공", "작곡전공", "국악전공"],
            "프리무스국제대학": ["국제경영학과", "모바일시스템공학과", "바이오소재융합공학과", "한국학과", "연기영상예술학과", "글로벌기초교육학부"]
        };

        function updateDepartments() {
            const college = document.getElementById("college").value;
            const departmentSelect = document.getElementById("department");

            departmentSelect.innerHTML = '<option value="">학과 선택</option>';

            if (!college || !departmentsByCollege[college]) {
                return;
            }

            departmentsByCollege[college].forEach(function (department) {
                const option = document.createElement("option");
                option.value = department;
                option.innerText = department;
                departmentSelect.appendChild(option);
            });
        }
        async function register() {
            const student_id = document.getElementById("student_id").value.trim();
            const password = document.getElementById("password").value.trim();
            const name = document.getElementById("name").value.trim();
            const college = document.getElementById("college").value;
            const department = document.getElementById("department").value;
            const grade = Number(document.getElementById("grade").value);

            const fields = ["student_id", "password", "name", "college", "department", "grade"];
            fields.forEach(function (id) {
                document.getElementById(id).classList.remove("error-field");
            });

            if (!student_id) {
                showError("student_id", "학번을 입력해주세요.");
                return;
            }

            if (!password) {
                showError("password", "비밀번호를 입력해주세요.");
                return;
            }

            if (!name) {
                showError("name", "이름을 입력해주세요.");
                return;
            }

            if (!college) {
                showError("college", "단과대학을 선택해주세요.");
                return;
            }

            if (college !== "퇴계혁신칼리지" && !department) {
                showError("department", "학과를 선택해주세요.");
                return;
            }

            if (!grade) {
                showError("grade", "학년을 선택해주세요.");
                return;
            }

            const response = await fetch("/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    student_id: student_id,
                    password: password,
                    name: name,
                    college: college,
                    department: department,
                    grade: grade
                })
            });

            const data = await response.json();

            document.getElementById("message").innerText =
                data.message || data.detail;

            if (data.message === "회원가입 성공!") {
                alert("회원가입 성공! 로그인 페이지로 이동합니다.");
                location.href = "/login";
            }
        }

        function showError(fieldId, message) {
            const field = document.getElementById(fieldId);
            field.classList.add("error-field");
            field.focus();

            document.getElementById("message").innerText = message;
        }
    </script>
</body>

</html>
